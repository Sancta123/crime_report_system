<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sentinel — Crime Reporting</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEME TOKENS ── */
:root {
  --ff-head: 'Syne', sans-serif;
  --ff-body: 'Plus Jakarta Sans', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  --trans: 0.22s cubic-bezier(.4,0,.2,1);
}

/* LIGHT */
body.light {
  --bg:       #f5f2ee;
  --surface:  #ffffff;
  --surface2: #fdf9f5;
  --border:   #e8e1d9;
  --border2:  #d4c9bc;
  --text:     #1c1917;
  --text2:    #57534e;
  --text3:    #a8a29e;
  --primary:  #c2410c;      /* warm terracotta */
  --primary-l:#fff1ed;
  --primary-b:#fdba74;
  --blue:     #0369a1;
  --blue-l:   #e0f2fe;
  --green:    #15803d;
  --green-l:  #dcfce7;
  --amber:    #b45309;
  --amber-l:  #fef3c7;
  --red:      #dc2626;
  --red-l:    #fee2e2;
  --purple:   #7c3aed;
  --purple-l: #ede9fe;
}

/* DARK */
body.dark {
  --bg:       #141210;
  --surface:  #1e1a17;
  --surface2: #252019;
  --border:   #2e2821;
  --border2:  #3d3328;
  --text:     #f5f0ea;
  --text2:    #b5a99a;
  --text3:    #6b5f52;
  --primary:  #fb923c;
  --primary-l:#2c1810;
  --primary-b:#7c2d12;
  --blue:     #38bdf8;
  --blue-l:   #0c2a3a;
  --green:    #4ade80;
  --green-l:  #052e16;
  --amber:    #fbbf24;
  --amber-l:  #1c1203;
  --red:      #f87171;
  --red-l:    #2d0a0a;
  --purple:   #a78bfa;
  --purple-l: #1e0a3c;
}

body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--trans), color var(--trans);
  line-height: 1.5;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  gap: 1rem;
  box-shadow: 0 1px 0 var(--border);
  backdrop-filter: blur(12px);
}

.brand { display: flex; align-items: center; gap: 0.75rem; }
.brand-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--primary), var(--primary-b));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  flex-shrink: 0;
}
.brand-name {
  font-family: var(--ff-head);
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 0.04em;
}
.brand-tag {
  font-size: 0.65rem;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.06em;
  margin-top: -2px;
}

.topbar-right { display: flex; align-items: center; gap: 0.75rem; }

.theme-toggle {
  width: 44px; height: 24px;
  background: var(--border2);
  border-radius: 99px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background var(--trans);
  flex-shrink: 0;
}
.theme-toggle.on { background: var(--primary); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--trans);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem;
}
.theme-toggle.on .toggle-knob { transform: translateX(20px); }

.status-badge {
  display: flex; align-items: center; gap: 0.4rem;
  background: var(--green-l);
  color: var(--green);
  border-radius: 99px;
  padding: 0.3rem 0.8rem;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: p 1.8s ease-in-out infinite;
}
@keyframes p { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

.officer-btn {
  display: flex; align-items: center; gap: 0.6rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 0.35rem 1rem 0.35rem 0.5rem;
  cursor: pointer;
  transition: border-color var(--trans), box-shadow var(--trans);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.officer-btn:hover { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-l); }
.officer-avatar {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #f97316, #ef4444);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
}

/* ── SHELL ── */
.shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 64px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 1.25rem 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.sidebar-section {
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.75rem 0.75rem 0.25rem;
  margin-top: 0.25rem;
}
.nav-link {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.6rem 0.85rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.86rem;
  font-weight: 500;
  color: var(--text2);
  transition: all var(--trans);
  user-select: none;
  position: relative;
}
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active {
  background: var(--primary-l);
  color: var(--primary);
  font-weight: 700;
}
.nav-link .icon { font-size: 1.05rem; }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 700;
  border-radius: 99px;
  padding: 0.1rem 0.45rem;
  min-width: 18px;
  text-align: center;
}

/* ── MAIN ── */
.main { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }

/* ── PAGE HEADER ── */
.page-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-wrap: wrap; gap: 1rem;
}
.page-greeting { font-size: 0.82rem; color: var(--text3); font-weight: 500; margin-bottom: 0.2rem; }
.page-title { font-family: var(--ff-head); font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1.1; }
.page-sub { font-size: 0.78rem; color: var(--text2); margin-top: 0.3rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.65rem 1.25rem;
  border-radius: var(--radius-sm);
  font-family: var(--ff-body);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all var(--trans);
  letter-spacing: 0.02em;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #ea580c);
  color: #fff;
  box-shadow: 0 3px 12px rgba(194,65,12,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(194,65,12,0.4); }
.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--border); color: var(--text); }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  display: flex; flex-direction: column; gap: 0.5rem;
  transition: transform var(--trans), box-shadow var(--trans);
  position: relative; overflow: hidden;
}
.stat-card::after {
  content: attr(data-emoji);
  position: absolute;
  right: -4px; bottom: -8px;
  font-size: 3.5rem;
  opacity: 0.08;
  pointer-events: none;
  user-select: none;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.stat-label { font-size: 0.72rem; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }
.stat-value { font-family: var(--ff-head); font-size: 2.1rem; font-weight: 800; line-height: 1; }
.stat-delta { font-size: 0.73rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; }
.delta-up { color: var(--green); }
.delta-dn { color: var(--red); }
.delta-neu { color: var(--text3); }

/* ── GRID ── */
.content-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.25rem; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-head {
  padding: 1.1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.75rem;
}
.card-title {
  display: flex; align-items: center; gap: 0.6rem;
  font-size: 0.88rem; font-weight: 700; color: var(--text);
}
.card-action {
  font-size: 0.72rem; font-weight: 600; color: var(--primary);
  cursor: pointer; background: none; border: none;
  padding: 0.3rem 0.6rem;
  border-radius: var(--radius-sm);
  transition: background var(--trans);
}
.card-action:hover { background: var(--primary-l); }

/* ── FORM ── */
.form-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.field { display: flex; flex-direction: column; gap: 0.4rem; }
.field.full { grid-column: 1/-1; }
.field label {
  font-size: 0.72rem; font-weight: 600;
  color: var(--text2);
  display: flex; align-items: center; gap: 0.3rem;
  letter-spacing: 0.02em;
}
.field input, .field select, .field textarea {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.85rem;
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 0.84rem;
  outline: none;
  transition: border-color var(--trans), box-shadow var(--trans), background var(--trans);
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-l);
  background: var(--surface);
}
.field textarea { resize: vertical; min-height: 90px; }
.field select option { background: var(--surface); }

/* severity */
.sev-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
.sev-btn {
  border: 2px solid var(--border);
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.4rem;
  text-align: center;
  cursor: pointer;
  transition: all var(--trans);
  display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
}
.sev-btn:hover { border-color: var(--border2); transform: scale(1.03); }
.sev-btn .sev-ico { font-size: 1.3rem; }
.sev-btn .sev-lbl { font-size: 0.58rem; font-weight: 700; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
.sev-btn.active-low { border-color: var(--green); background: var(--green-l); }
.sev-btn.active-low .sev-lbl { color: var(--green); }
.sev-btn.active-med { border-color: var(--amber); background: var(--amber-l); }
.sev-btn.active-med .sev-lbl { color: var(--amber); }
.sev-btn.active-high { border-color: var(--red); background: var(--red-l); }
.sev-btn.active-high .sev-lbl { color: var(--red); }
.sev-btn.active-crit { border-color: var(--purple); background: var(--purple-l); }
.sev-btn.active-crit .sev-lbl { color: var(--purple); }

.sec-hint {
  display: flex; align-items: flex-start; gap: 0.6rem;
  background: var(--blue-l);
  border: 1px solid var(--blue);
  border-radius: var(--radius-sm);
  padding: 0.8rem;
  font-size: 0.75rem;
  color: var(--blue);
  line-height: 1.55;
}

.form-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }

/* ── FEED ── */
.feed-list { padding: 0.5rem 0; }
.feed-item {
  display: flex; align-items: flex-start; gap: 0.85rem;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  transition: background var(--trans);
  cursor: pointer;
}
.feed-item:last-child { border-bottom: none; }
.feed-item:hover { background: var(--surface2); }
.feed-ico { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
.feed-body { flex: 1; }
.feed-title { font-size: 0.82rem; line-height: 1.45; color: var(--text); }
.feed-title strong { color: var(--primary); }
.feed-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
.feed-time { font-size: 0.68rem; color: var(--text3); font-weight: 500; }
.feed-tag {
  font-size: 0.6rem; font-weight: 700;
  padding: 0.1rem 0.45rem;
  border-radius: 99px;
  letter-spacing: 0.04em;
}

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  font-size: 0.65rem; font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.7rem 1.1rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--surface2);
}
tbody tr { border-bottom: 1px solid var(--border); transition: background var(--trans); cursor: pointer; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 0.85rem 1.1rem; font-size: 0.82rem; vertical-align: middle; }

.case-id { font-size: 0.72rem; font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums; }
.type-cell { display: flex; align-items: center; gap: 0.5rem; font-weight: 500; }

.pill {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.66rem; font-weight: 700;
  padding: 0.2rem 0.65rem;
  border-radius: 99px;
  letter-spacing: 0.03em;
}
.pill-open   { background: var(--blue-l);   color: var(--blue);   }
.pill-review { background: var(--amber-l);  color: var(--amber);  }
.pill-closed { background: var(--green-l);  color: var(--green);  }

.sev-chip {
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-size: 0.72rem; font-weight: 600;
}
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-low  { background: var(--green); }
.dot-med  { background: var(--amber); }
.dot-high { background: var(--red); }
.dot-crit { background: var(--purple); }

/* ── SECURITY GRID ── */
.sec-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
.sec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem;
  display: flex; flex-direction: column; gap: 0.4rem;
  transition: transform var(--trans), box-shadow var(--trans);
}
.sec-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.sec-ico { font-size: 1.6rem; }
.sec-title { font-size: 0.7rem; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; }
.sec-val { font-family: var(--ff-head); font-size: 1.15rem; font-weight: 800; }
.sec-desc { font-size: 0.74rem; color: var(--text2); line-height: 1.5; }
.ok    { color: var(--green); }
.warn  { color: var(--amber); }
.alert { color: var(--red);   }

/* ── TOAST ── */
.toasts {
  position: fixed; top: 76px; right: 1.25rem;
  z-index: 500;
  display: flex; flex-direction: column; gap: 0.5rem;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--green);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  min-width: 290px;
  box-shadow: var(--shadow-lg);
  font-size: 0.82rem;
  animation: slideIn 0.3s ease;
  pointer-events: all;
}
.toast.err { border-left-color: var(--red); }
@keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity var(--trans);
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 460px; max-width: 95vw;
  box-shadow: var(--shadow-lg);
  transform: scale(0.96) translateY(12px);
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
}
.overlay.open .modal { transform: scale(1) translateY(0); }
.modal-head {
  padding: 1.25rem 1.4rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: var(--ff-head); font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
.modal-close { background: none; border: none; color: var(--text3); font-size: 1.1rem; cursor: pointer; padding: 0.25rem; line-height: 1; border-radius: 6px; transition: background var(--trans), color var(--trans); }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 1.4rem; display: flex; flex-direction: column; gap: 1rem; }

.loading-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #fb923c); animation: load 2s ease forwards; }
@keyframes load { from{width:0%} to{width:100%} }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.75rem 1.1rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.chip {
  padding: 0.3rem 0.8rem;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: none;
  color: var(--text2);
  font-size: 0.72rem; font-weight: 600;
  cursor: pointer;
  transition: all var(--trans);
  display: flex; align-items: center; gap: 0.3rem;
}
.chip:hover { border-color: var(--border2); color: var(--text); }
.chip.active { border-color: var(--primary); background: var(--primary-l); color: var(--primary); }
.search-box {
  margin-left: auto;
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 0.3rem 0.85rem;
  transition: border-color var(--trans);
}
.search-box:focus-within { border-color: var(--primary); }
.search-box input { border: none; background: none; color: var(--text); font-size: 0.78rem; font-family: var(--ff-body); outline: none; width: 130px; }

/* ── RESPONSIVE ── */
@media (max-width:1100px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .content-grid { grid-template-columns: 1fr; }
  .sec-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width:720px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar-wrap { display: none; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .main { padding: 1rem; }
  .sec-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ─── tiny data ─── */
const INITIAL_FEED = [

/* ─── toast hook ─── */
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, err=false) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, err }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  }, []);
  return { toasts, add };
}

/* ─── SeverityPicker ─── */
function SeverityPicker({ value, onChange }) {
  const levels = [
    { k:'low',  ico:'🟢', label:'Low'      },
    { k:'med',  ico:'🟡', label:'Medium'   },
    { k:'high', ico:'🔴', label:'High'     },
    { k:'crit', ico:'🟣', label:'Critical' },
  ];
  return (
    <div className="sev-grid">
      {levels.map(l => (
        <button
          key={l.k}
          className={`sev-btn${value===l.k ? ' active-'+l.k : ''}`}
          onClick={() => onChange(l.k)}
          type="button"
        >
          <span className="sev-ico">{l.ico}</span>
          <span className="sev-lbl">{l.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ─── StatCard ─── */
function StatCard({ emoji, value, label, delta, deltaType, color }) {
  return (
    <div className="stat-card" data-emoji={emoji} style={{ borderTop: `3px solid var(--${color})` }}>
      <div className="stat-label">{label}</div>
      <div className="stat-value" style={{ color: `var(--${color})` }}>{value}</div>
      <div className={`stat-delta delta-${deltaType}`}>{delta}</div>
    </div>
  );
}

/* ─── ReportForm ─── */
function ReportForm({ onSubmit }) {
  const [form, setForm] = useState({ dt: '2026-05-23T09:30', loc: '', ctype: '— Select Type —', desc: '', susp: '', sev: 'low' });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const handle = e => set(e.target.name, e.target.value);
  const submit = () => {
    if (!form.loc.trim())                       { onSubmit(null, '⚠️ Please enter a location');          return; }
    if (form.ctype === '— Select Type —')        { onSubmit(null, '⚠️ Please select a crime type');      return; }
    if (!form.desc.trim())                       { onSubmit(null, '⚠️ Please add an incident description'); return; }
    onSubmit(form);
    setForm({ dt: '2026-05-23T09:30', loc: '', ctype: '— Select Type —', desc: '', susp: '', sev: 'low' });
  };
  return (
    <div className="form-body">
      <div className="field-row">
        <div className="field">
          <label>🗓️ Date &amp; Time</label>
          <input type="datetime-local" name="dt" value={form.dt} onChange={handle}/>
        </div>
        <div className="field">
          <label>📍 Location</label>
          <input type="text" name="loc" value={form.loc} onChange={handle} placeholder="Sector, District…"/>
        </div>
      </div>
      <div className="field-row">
        <div className="field">
          <label>🏷️ Crime Type</label>
          <select name="ctype" value={form.ctype} onChange={handle}>
            {CRIME_TYPES.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="field">
          <label>👤 Reporting Officer</label>
          <input type="text" value="J. Mutoni — Badge #4521" readOnly style={{ opacity:.6 }}/>
        </div>
      </div>
      <div className="field full">
        <label>⚠️ Severity Level</label>
        <SeverityPicker value={form.sev} onChange={v => set('sev', v)}/>
      </div>
      <div className="field full">
        <label>📄 Incident Description</label>
        <textarea name="desc" value={form.desc} onChange={handle} placeholder="Describe what happened, who was involved, the circumstances…"/>
      </div>
      <div className="field-row">
        <div className="field">
          <label>🧑‍🤝‍🧑 Suspects</label>
          <input type="text" name="susp" value={form.susp} onChange={handle} placeholder="Names, descriptions…"/>
        </div>
        <div className="field">
          <label>🎫 Case Reference</label>
          <input type="text" value="Auto-assigned on submit" readOnly style={{ opacity:.4 }}/>
        </div>
      </div>
      <div className="sec-hint">
        <span>🔐</span>
        This report is end-to-end encrypted (AES-256). Submission is logged with your badge number, device IP, and timestamp. Unauthorised alterations are a criminal offence.
      </div>
      <div className="form-actions">
        <button className="btn btn-ghost">💾 Save Draft</button>
        <button className="btn btn-primary" onClick={submit}>📤 Submit Report</button>
      </div>
    </div>
  );
}

/* ─── CasesTable ─── */
function CasesTable({ cases, filter }) {
  const filtered = filter === 'all' ? cases : cases.filter(c => c.status === filter);
  return (
    <div className="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Case ID</th><th>Type</th><th>Severity</th><th>Status</th><th>Filed</th>
          </tr>
        </thead>
        <tbody>
          {filtered.map(c => (
            <tr key={c.id}>
              <td><span className="case-id">{c.id}</span></td>
              <td><div className="type-cell">{c.type}</div></td>
              <td>
                <span className="sev-chip">
                  <span className={`dot dot-${c.sev}`}/>
                  {{ low:'Low', med:'Medium', high:'High', crit:'Critical' }[c.sev]}
                </span>
              </td>
              <td>
                <span className={`pill pill-${c.status}`}>
                  {{ open:'🔵 Open', review:'🟡 Review', closed:'✅ Closed' }[c.status]}
                </span>
              </td>
              <td style={{ color:'var(--text3)', fontSize:'0.76rem' }}>{c.filed}</td>
            </tr>
          ))}
          {filtered.length === 0 && (
            <tr><td colSpan={5} style={{ textAlign:'center', color:'var(--text3)', padding:'2rem' }}>No cases match this filter</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* ─── LoginModal ─── */
function LoginModal({ open, onClose, onLogin }) {
  const [badge, setBadge] = useState('');
  const [loading, setLoading] = useState(false);
  const doLogin = () => {
    if (!badge.trim()) { onLogin(null); return; }
    setLoading(true);
    setTimeout(() => { setLoading(false); onClose(); onLogin(badge); }, 2300);
  };
  return (
    <div className={`overlay ${open?'open':''}`} onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-title">🔐 Officer Sign In</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="sec-hint">
            <span>🛡️</span>
            Session secured with TLS 1.3. All login attempts are logged and monitored. Unauthorised access is a prosecutable offence.
          </div>
          <div className="field">
            <label>🎫 Badge Number</label>
            <input type="text" value={badge} onChange={e=>setBadge(e.target.value)} placeholder="e.g. 4521"/>
          </div>
          <div className="field">
            <label>🔑 Password</label>
            <input type="password" placeholder="••••••••"/>
          </div>
          <div className="field">
            <label>📱 MFA Code</label>
            <input type="text" placeholder="6-digit authenticator code" maxLength={6}/>
          </div>
          {loading && <div className="loading-bar"><div className="loading-fill"/></div>}
          <button className="btn btn-primary" style={{ justifyContent:'center' }} onClick={doLogin}>
            {loading ? '⏳ Verifying…' : '🚀 Secure Login'}
          </button>
        </div>
      </div>
    </div>
  );
}
